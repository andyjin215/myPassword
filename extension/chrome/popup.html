<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPassword</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <!-- Loading State -->
    <section id="state-loading" class="state active">
        <div class="center-content">
            <div class="spinner"></div>
            <p class="status-text">Connecting...</p>
        </div>
    </section>

    <!-- Pair State -->
    <section id="state-pair" class="state">
        <div class="center-content">
            <div class="logo-icon">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="#6366f1"/>
                    <path d="M24 12c-3.3 0-6 2.7-6 6v4h-2a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V24a2 2 0 00-2-2h-2v-4c0-3.3-2.7-6-6-6zm-2 10v-4a2 2 0 114 0v4h-4zm2 6a2 2 0 110 4 2 2 0 010-4z" fill="#fff"/>
                </svg>
            </div>
            <h1 class="app-title">MyPassword Extension</h1>
            <p class="app-subtitle">Connect to the desktop app to manage your passwords.</p>
            <button id="btn-pair" class="btn btn-primary btn-full">Pair with Desktop App</button>
            <p id="pair-status" class="status-text hidden"></p>
        </div>
    </section>

    <!-- Unlock State -->
    <section id="state-unlock" class="state">
        <div class="center-content">
            <div class="logo-icon">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="#6366f1"/>
                    <path d="M24 12c-3.3 0-6 2.7-6 6v4h-2a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V24a2 2 0 00-2-2h-2v-4c0-3.3-2.7-6-6-6zm-2 10v-4a2 2 0 114 0v4h-4zm2 6a2 2 0 110 4 2 2 0 010-4z" fill="#fff"/>
                </svg>
            </div>
            <h1 class="app-title">Unlock Vault</h1>
            <p class="app-subtitle">Enter your master password to continue.</p>
            <form id="form-unlock" autocomplete="off">
                <input
                    type="password"
                    id="input-password"
                    class="input-field"
                    placeholder="Master password"
                    autofocus
                >
                <button type="submit" class="btn btn-primary btn-full">Unlock</button>
            </form>
            <p id="unlock-status" class="status-text hidden"></p>
        </div>
    </section>

    <!-- Items State -->
    <section id="state-items" class="state">
        <!-- Header -->
        <div class="items-header">
            <div class="items-header-left">
                <svg width="24" height="24" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="#6366f1"/>
                    <path d="M24 12c-3.3 0-6 2.7-6 6v4h-2a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V24a2 2 0 00-2-2h-2v-4c0-3.3-2.7-6-6-6zm-2 10v-4a2 2 0 114 0v4h-4zm2 6a2 2 0 110 4 2 2 0 010-4z" fill="#fff"/>
                </svg>
                <span class="items-header-title">MyPassword</span>
            </div>
            <div class="items-header-actions">
                <button id="btn-lock" class="btn-icon" title="Lock vault">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                </button>
                <button id="btn-add" class="btn-icon" title="Add new item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Search -->
        <div class="search-container">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
                type="text"
                id="input-search"
                class="input-field search-input"
                placeholder="Search passwords..."
            >
        </div>

        <!-- Item List -->
        <div id="item-list" class="item-list"></div>

        <!-- Empty state -->
        <div id="empty-state" class="empty-state hidden">
            <p>No passwords found.</p>
            <p class="empty-sub">Add items in the desktop app or create one here.</p>
        </div>

        <!-- Items status -->
        <p id="items-status" class="status-text hidden"></p>
    </section>

    <!-- Error State (daemon unreachable, not initialized) -->
    <section id="state-error" class="state">
        <div class="center-content">
            <div class="logo-icon">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="#ef4444"/>
                    <path d="M24 14v12M24 30v2" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="app-title">Connection Error</h1>
            <p id="error-message" class="status-text">Desktop app not running.</p>
            <button id="btn-retry" class="btn btn-secondary btn-full">Retry</button>
        </div>
    </section>

    <script src="popup.js"></script>
</body>
</html>
