<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyPassword Icon Generator</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 40px; }
        h1 { margin-bottom: 20px; }
        .icon-row { display: flex; gap: 24px; align-items: flex-end; margin: 20px 0; flex-wrap: wrap; }
        .icon-card { text-align: center; }
        canvas { display: block; border: 1px solid #334155; border-radius: 4px; image-rendering: pixelated; }
        a { display: block; margin-top: 8px; color: #6366f1; font-size: 13px; }
        .label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    </style>
</head>
<body>
    <h1>MyPassword Icon Generator</h1>
    <p>Open this file in a browser to preview and download the extension icons.</p>
    <div class="icon-row" id="icons"></div>

    <script>
        const sizes = [16, 32, 48, 128];
        const container = document.getElementById('icons');

        function drawIcon(canvas, size) {
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Indigo rounded rect background
            const r = size * 0.25;
            ctx.beginPath();
            ctx.moveTo(r, 0);
            ctx.lineTo(size - r, 0);
            ctx.arcTo(size, 0, size, r, r);
            ctx.lineTo(size, size - r);
            ctx.arcTo(size, size, size - r, size, r);
            ctx.lineTo(r, size);
            ctx.arcTo(0, size, 0, size - r, r);
            ctx.lineTo(0, r);
            ctx.arcTo(0, 0, r, 0, r);
            ctx.closePath();
            ctx.fillStyle = '#6366f1';
            ctx.fill();
            ctx.save();
            ctx.clip();

            // Lock body
            const cx = size / 2;
            const bodyW = size * 0.50;
            const bodyH = size * 0.36;
            const bodyX = cx - bodyW / 2;
            const bodyY = cx - bodyH / 2 + size * 0.08;
            const bodyR = size * 0.05;

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(bodyX + bodyR, bodyY);
            ctx.lineTo(bodyX + bodyW - bodyR, bodyY);
            ctx.arcTo(bodyX + bodyW, bodyY, bodyX + bodyW, bodyY + bodyR, bodyR);
            ctx.lineTo(bodyX + bodyW, bodyY + bodyH - bodyR);
            ctx.arcTo(bodyX + bodyW, bodyY + bodyH, bodyX + bodyW - bodyR, bodyY + bodyH, bodyR);
            ctx.lineTo(bodyX + bodyR, bodyY + bodyH);
            ctx.arcTo(bodyX, bodyY + bodyH, bodyX, bodyY + bodyH - bodyR, bodyR);
            ctx.lineTo(bodyX, bodyY + bodyR);
            ctx.arcTo(bodyX, bodyY, bodyX + bodyR, bodyY, bodyR);
            ctx.closePath();
            ctx.fill();

            // Shackle
            const shackleOuterR = size * 0.20;
            const shackleInnerR = size * 0.12;
            ctx.beginPath();
            ctx.arc(cx, bodyY, shackleOuterR, Math.PI, 0, false);
            ctx.arc(cx, bodyY, shackleInnerR, 0, Math.PI, true);
            ctx.closePath();
            ctx.fill();

            // Keyhole
            const holeR = size * 0.04;
            ctx.fillStyle = '#6366f1';
            ctx.beginPath();
            ctx.arc(cx, bodyY + bodyH * 0.45, holeR, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        sizes.forEach(size => {
            const card = document.createElement('div');
            card.className = 'icon-card';

            const scale = Math.max(1, Math.floor(128 / size));
            const canvas = document.createElement('canvas');
            canvas.style.width = (size * scale) + 'px';
            canvas.style.height = (size * scale) + 'px';
            drawIcon(canvas, size);

            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = `${size}x${size}`;

            // Download link
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `icon${size}.png`;
                a.textContent = `Download icon${size}.png`;
                card.appendChild(a);
            });

            card.prepend(label);
            card.prepend(canvas);
            container.appendChild(card);
        });
    </script>
</body>
</html>
